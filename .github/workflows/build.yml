name: Build patched APKs

on:
  workflow_dispatch:
    inputs:
      targets:
        description: "Comma-separated targets: youtube,youtube-music"
        required: true
        default: "youtube,youtube-music"
      cli_version:
        description: "Morphe CLI tag, or latest"
        required: true
        default: "latest"
      patches_version:
        description: "Morphe patches tag, or latest"
        required: true
        default: "latest"
      apk_version_source:
        description: "APK version source: recommended, latest, or an explicit version"
        required: true
        default: "recommended"
      force_patch:
        description: "Pass --force to skip Morphe APK version compatibility checks"
        required: true
        type: boolean
        default: true
      continue_on_error:
        description: "Pass --continue-on-error so compatible patches can still be applied if one patch fails"
        required: true
        type: boolean
        default: true
      create_release:
        description: "Create a GitHub Release and attach patched APKs"
        required: true
        type: boolean
        default: true
      upload_artifact:
        description: "Upload patched APKs as a short-lived workflow artifact"
        required: true
        type: boolean
        default: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Download Morphe tools
        env:
          MORPHE_CLI_VERSION: ${{ inputs.cli_version }}
          MORPHE_PATCHES_VERSION: ${{ inputs.patches_version }}
        run: node scripts/morphe.mjs tools

      - name: Restore optional signing keystore
        env:
          APK_KEYSTORE_B64: ${{ secrets.APK_KEYSTORE_B64 }}
          APK_KEYSTORE_PASSWORD: ${{ secrets.APK_KEYSTORE_PASSWORD }}
          APK_KEYSTORE_ALIAS: ${{ secrets.APK_KEYSTORE_ALIAS || 'mistu' }}
          APK_KEYSTORE_ENTRY_PASSWORD: ${{ secrets.APK_KEYSTORE_ENTRY_PASSWORD }}
        run: |
          if [ -n "$APK_KEYSTORE_B64" ]; then
            if [ -z "$APK_KEYSTORE_PASSWORD" ] || [ -z "$APK_KEYSTORE_ENTRY_PASSWORD" ]; then
              echo "::error::APK_KEYSTORE_B64 is set, but APK_KEYSTORE_PASSWORD or APK_KEYSTORE_ENTRY_PASSWORD is missing."
              exit 1
            fi
            mkdir -p .secrets
            printf '%s' "$APK_KEYSTORE_B64" | tr -d '[:space:]' | base64 -d > .secrets/mistu-release-source.jks

            cat > .secrets/ConvertKeystore.java <<'JAVA'
            import java.io.InputStream;
            import java.io.OutputStream;
            import java.nio.file.Files;
            import java.nio.file.Path;
            import java.security.Key;
            import java.security.KeyStore;
            import java.security.Provider;
            import java.security.Security;
            import java.security.cert.Certificate;
            import org.bouncycastle.jce.provider.BouncyCastleProvider;

            public final class ConvertKeystore {
              private record LoadedStore(KeyStore store, String type) {}

              public static void main(String[] args) throws Exception {
                Path input = Path.of(args[0]);
                Path output = Path.of(args[1]);
                char[] storePassword = requiredEnv("APK_KEYSTORE_PASSWORD").toCharArray();
                char[] entryPassword = envOr("APK_KEYSTORE_ENTRY_PASSWORD", requiredEnv("APK_KEYSTORE_PASSWORD")).toCharArray();
                String alias = envOr("APK_KEYSTORE_ALIAS", "mistu");

                Provider bc = new BouncyCastleProvider();
                if (Security.getProvider(bc.getName()) == null) Security.addProvider(bc);

                LoadedStore loaded = loadStore(input, storePassword);
                Key key = loaded.store().getKey(alias, entryPassword);
                if (key == null) {
                  throw new IllegalStateException("Signing key alias not found in " + loaded.type() + " keystore: " + alias);
                }

                Certificate[] chain = loaded.store().getCertificateChain(alias);
                if (chain == null) {
                  Certificate certificate = loaded.store().getCertificate(alias);
                  if (certificate == null) {
                    throw new IllegalStateException("No certificate found for signing key alias: " + alias);
                  }
                  chain = new Certificate[] { certificate };
                }

                KeyStore bks = KeyStore.getInstance("BKS", "BC");
                bks.load(null, storePassword);
                bks.setKeyEntry(alias, key, entryPassword, chain);

                try (OutputStream stream = Files.newOutputStream(output)) {
                  bks.store(stream, storePassword);
                }
              }

              private static LoadedStore loadStore(Path path, char[] password) throws Exception {
                Exception last = null;
                for (String type : new String[] { "JKS", "PKCS12", "BKS" }) {
                  try {
                    KeyStore store = "BKS".equals(type)
                      ? KeyStore.getInstance(type, "BC")
                      : KeyStore.getInstance(type);
                    try (InputStream stream = Files.newInputStream(path)) {
                      store.load(stream, password);
                    }
                    return new LoadedStore(store, type);
                  } catch (Exception error) {
                    last = error;
                  }
                }

                throw new IllegalStateException("Could not load signing keystore as JKS, PKCS12, or BKS.", last);
              }

              private static String requiredEnv(String name) {
                String value = System.getenv(name);
                if (value == null || value.isEmpty()) {
                  throw new IllegalStateException(name + " is required");
                }
                return value;
              }

              private static String envOr(String name, String fallback) {
                String value = System.getenv(name);
                return value == null || value.isEmpty() ? fallback : value;
              }
            }
          JAVA

            javac -cp .cache/tools/morphe-cli.jar .secrets/ConvertKeystore.java
            java -cp ".cache/tools/morphe-cli.jar:.secrets" ConvertKeystore \
              .secrets/mistu-release-source.jks \
              .secrets/mistu-release.jks
            echo "KEYSTORE_FILE=.secrets/mistu-release.jks" >> "$GITHUB_ENV"
          fi

      - name: Configure Morphe patch flags
        env:
          FORCE_PATCH: ${{ inputs.force_patch }}
          CONTINUE_ON_ERROR: ${{ inputs.continue_on_error }}
        run: |
          node <<'NODE' >> "$GITHUB_ENV"
          const args = [];
          if (process.env.FORCE_PATCH === 'true') args.push('--force');
          if (process.env.CONTINUE_ON_ERROR === 'true') args.push('--continue-on-error');
          console.log(`MORPHE_EXTRA_ARGS_JSON=${JSON.stringify(args)}`);
          NODE

      - name: Build patched APKs
        env:
          BUILD_TARGETS: ${{ inputs.targets }}
          MORPHE_CLI_VERSION: ${{ inputs.cli_version }}
          MORPHE_PATCHES_VERSION: ${{ inputs.patches_version }}
          APK_SOURCE: apkpure
          APK_VERSION_SOURCE: ${{ inputs.apk_version_source }}
          YOUTUBE_APK_URL: ${{ secrets.YOUTUBE_APK_URL }}
          YOUTUBE_MUSIC_APK_URL: ${{ secrets.YOUTUBE_MUSIC_APK_URL }}
          KEYSTORE_PASSWORD: ${{ secrets.APK_KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.APK_KEYSTORE_ALIAS || 'mistu' }}
          KEYSTORE_ENTRY_PASSWORD: ${{ secrets.APK_KEYSTORE_ENTRY_PASSWORD }}
          SIGNER_NAME: Mistu
        run: node scripts/morphe.mjs build

      - name: Prepare release metadata
        if: ${{ inputs.create_release }}
        env:
          BUILD_TARGETS: ${{ inputs.targets }}
          APK_VERSION_SOURCE: ${{ inputs.apk_version_source }}
        run: |
          release_date="$(date -u +'%Y-%m-%d')"
          release_stamp="$(date -u +'%Y%m%d-%H%M%S')"
          tag="build-${release_stamp}-${GITHUB_RUN_NUMBER}"

          echo "RELEASE_TAG=${tag}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=Morph patched APKs ${release_date} #${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

          node scripts/morphe.mjs release-notes > release-notes.md

      - name: Create GitHub Release
        if: ${{ inputs.create_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$RELEASE_TAG" \
            output/*.apk \
            output/*-result.json \
            --title "$RELEASE_NAME" \
            --notes-file release-notes.md

      - name: Remember Morphe patch release
        if: ${{ inputs.create_release && inputs.patches_version != 'latest' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PATCHES_VERSION: ${{ inputs.patches_version }}
        run: gh variable set LAST_MORPHE_PATCHES_RELEASE --repo "$GITHUB_REPOSITORY" --body "$PATCHES_VERSION"

      - name: Upload patched APKs
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: patched-apks
          path: |
            output/*.apk
            output/*-result.json
          if-no-files-found: error
          retention-days: 1
